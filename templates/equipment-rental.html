<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipment Rental - Kisaan Saathi &#x1F33E;</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23395a7f'/%3E%3Cpath d='M30 40c0 0 5-10 20-10s20 10 20 10M30 60c0 0 5 10 20 10s20-10 20-10M50 40v20' stroke='white' stroke-width='8' fill='none'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#1e3a23]">
    <!-- Header -->
    <header class="bg-[#1e3a23] p-4 flex justify-between items-center">
      <div class="text-[#4caf50] text-3xl font-bold">
        Kisaan Saathi &#x1F33E;
      </div>
      <div class="flex items-center space-x-4">
        <a
          href="/dashboard.html"
          class="text-white hover:text-[#4caf50] text-lg flex items-center"
        >
          <i class="fas fa-chart-line mr-2"></i>
          Go to Dashboard
        </a>
        <button
          id="listEquipmentBtn"
          class="bg-[#4caf50] hover:bg-[#3d9140] text-white px-4 py-2 rounded-lg flex items-center"
        >
          <i class="fas fa-plus-circle mr-2"></i>
          List Your Equipment
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-6">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Filters Panel -->
        <div class="bg-[#162619] rounded-xl p-4 border border-[#2d3d2f]/40">
          <h2 class="text-lg font-bold text-white mb-4">Filters</h2>

          <div class="space-y-4">
            <div>
              <label class="block text-gray-300 text-sm mb-1"
                >Equipment Type</label
              >
              <select
                id="equipmentTypeFilter"
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              >
                <option value="">All Equipment</option>
                <option value="tractor">Tractors</option>
                <option value="harvester">Harvesters</option>
                <option value="drone">Drones</option>
                <option value="sprayer">Sprayers</option>
              </select>
            </div>

            <div>
              <label class="block text-gray-300 text-sm mb-1">Location</label>
              <input
                id="locationFilter"
                type="text"
                placeholder="Search location..."
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              />
            </div>

            <div>
              <label class="block text-gray-300 text-sm mb-1"
                >Price Range (&#x20B9;/day)</label
              >
              <div class="grid grid-cols-2 gap-2">
                <input
                  id="priceMinFilter"
                  type="number"
                  placeholder="Min"
                  class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
                />
                <input
                  id="priceMaxFilter"
                  type="number"
                  placeholder="Max"
                  class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
                />
              </div>
            </div>

            <button
              id="filterSearchBtn"
              class="w-full bg-[#4caf50] hover:bg-[#3d9140] text-white py-2 rounded-lg"
            >
              Search
            </button>
          </div>
        </div>

        <!-- Equipment Listings -->
        <div class="lg:col-span-3">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-white">Available Equipment</h2>
          </div>

          <div id="equipmentGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Equipment cards will be dynamically loaded here -->
            <div class="col-span-full text-center py-8">
              <i class="fas fa-spinner fa-spin text-[#4caf50] text-3xl"></i>
              <p class="text-gray-400 mt-2">Loading equipment...</p>
            </div>
          </div>

          <div id="showMoreContainer" class="mt-6 text-center hidden">
            <button
              id="showMoreBtn"
              class="bg-[#1a2e1d] hover:bg-[#2a3e2d] text-white py-2 px-6 rounded-lg"
            >
              Show More
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Equipment Listing Modal -->
    <div
      id="listEquipmentModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center"
    >
      <div class="bg-[#162619] rounded-xl p-6 w-full max-w-2xl">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-white">List Your Equipment</h3>
          <button id="closeModal" class="text-gray-400 hover:text-white">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="equipmentForm" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-300 text-sm mb-1"
                >Equipment Type</label
              >
              <select
                required
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              >
                <option value="">Select Type</option>
                <option value="tractor">Tractor</option>
                <option value="harvester">Harvester</option>
                <option value="drone">Drone</option>
                <option value="sprayer">Sprayer</option>
                <option value="rotavator">Rotavator</option>
                <option value="plough">Plough</option>
              </select>
            </div>
            <div>
              <label class="block text-gray-300 text-sm mb-1">Model Name</label>
              <input
                type="text"
                required
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              />
            </div>
            <div>
              <label class="block text-gray-300 text-sm mb-1"
                >Daily Rate (&#x20B9;)</label
              >
              <input
                type="number"
                required
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              />
            </div>
            <div>
              <label class="block text-gray-300 text-sm mb-1">Location</label>
              <input
                type="text"
                required
                class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
              />
            </div>
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1">Description</label>
            <textarea
              rows="3"
              class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
            ></textarea>
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1"
              >Upload Photos</label
            >
            <div
              class="border-2 border-dashed border-[#4caf50]/30 rounded-lg p-4 text-center"
            >
              <i
                class="fas fa-cloud-upload-alt text-3xl text-[#4caf50] mb-2"
              ></i>
              <p class="text-gray-400">
                Drag and drop photos here or click to browse
              </p>
              <input type="file" multiple accept="image/*" class="hidden" />
            </div>
          </div>
          <div class="flex justify-end space-x-4">
            <button
              type="button"
              id="cancelBtn"
              class="bg-[#1a2e1d] hover:bg-[#2a3e2d] border border-[#4caf50] text-[#4caf50] py-2 px-6 rounded-lg"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-[#4caf50] hover:bg-[#3d9140] text-white py-2 px-6 rounded-lg"
            >
              List Equipment
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Booking Modal -->
    <div
      id="bookingModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"
    >
      <div
        class="bg-[#162619] rounded-xl p-6 w-full max-w-md mx-4 border border-[#4caf50]/30"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-white">Book Equipment</h3>
          <button id="closeBookingModal" class="text-gray-400 hover:text-white">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <p
          id="bookingEquipmentName"
          class="text-[#4caf50] font-semibold mb-4"
        ></p>
        <form id="bookingForm" class="space-y-4">
          <input type="hidden" id="bookingEquipmentId" value="" />
          <div>
            <label class="block text-gray-300 text-sm mb-1">Your Name</label>
            <input
              type="text"
              id="renterName"
              required
              placeholder="Enter your full name"
              class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1">Phone Number</label>
            <input
              type="tel"
              id="renterPhone"
              required
              placeholder="Enter your phone number"
              class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1">Start Date</label>
            <input
              type="date"
              id="startDate"
              required
              class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
            />
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1">End Date</label>
            <input
              type="date"
              id="endDate"
              required
              class="w-full bg-[#1a2e1d] px-3 py-2 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#4caf50] border border-[#4caf50]/30"
            />
          </div>
          <div class="flex justify-end space-x-4 pt-2">
            <button
              type="button"
              id="cancelBookingBtn"
              class="bg-[#1a2e1d] hover:bg-[#2a3e2d] border border-[#4caf50] text-[#4caf50] py-2 px-6 rounded-lg"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="submitBookingBtn"
              class="bg-[#4caf50] hover:bg-[#3d9140] text-white py-2 px-6 rounded-lg"
            >
              Confirm Booking
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Success Toast -->
    <div
      id="successToast"
      class="fixed top-6 right-6 bg-[#4caf50] text-white px-6 py-4 rounded-xl shadow-lg hidden z-50 items-center gap-3 transition-all duration-300"
    >
      <i class="fas fa-check-circle text-xl"></i>
      <span id="successToastMsg">Booking confirmed successfully!</span>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // --- Element References ---
        var equipmentGrid = document.getElementById("equipmentGrid");
        var typeFilter = document.getElementById("equipmentTypeFilter");
        var locationFilter = document.getElementById("locationFilter");
        var priceMinFilter = document.getElementById("priceMinFilter");
        var priceMaxFilter = document.getElementById("priceMaxFilter");
        var filterSearchBtn = document.getElementById("filterSearchBtn");
        var showMoreContainer = document.getElementById("showMoreContainer");
        var showMoreBtn = document.getElementById("showMoreBtn");

        // List Equipment Modal elements
        var listModal = document.getElementById("listEquipmentModal");
        var listBtn = document.getElementById("listEquipmentBtn");
        var closeBtn = document.getElementById("closeModal");
        var cancelBtn = document.getElementById("cancelBtn");
        var equipmentForm = document.getElementById("equipmentForm");

        // Booking Modal elements
        var bookingModal = document.getElementById("bookingModal");
        var closeBookingModalBtn = document.getElementById("closeBookingModal");
        var cancelBookingBtn = document.getElementById("cancelBookingBtn");
        var bookingForm = document.getElementById("bookingForm");
        var bookingEquipmentId = document.getElementById("bookingEquipmentId");
        var bookingEquipmentName = document.getElementById(
          "bookingEquipmentName",
        );

        // Success Toast elements
        var successToast = document.getElementById("successToast");
        var successToastMsg = document.getElementById("successToastMsg");

        // --- Helper: Show / Hide Modal ---
        function openModal(modal) {
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        function closeModalFn(modal) {
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }

        // --- Helper: Show Success Toast ---
        function showToast(message) {
          successToastMsg.textContent = message;
          successToast.classList.remove("hidden");
          successToast.classList.add("flex");
          setTimeout(function () {
            successToast.classList.add("hidden");
            successToast.classList.remove("flex");
          }, 4000);
        }

        // --- Helper: Generate Star Rating HTML ---
        function renderStars(rating) {
          var html = "";
          var fullStars = Math.floor(rating);
          var decimal = rating - fullStars;
          var hasHalf = decimal >= 0.25 && decimal < 0.75;
          if (decimal >= 0.75) {
            fullStars++;
          }
          var emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);
          for (var i = 0; i < fullStars; i++) {
            html += '<i class="fas fa-star"></i>';
          }
          if (hasHalf) {
            html += '<i class="fas fa-star-half-alt"></i>';
          }
          for (var j = 0; j < emptyStars; j++) {
            html += '<i class="far fa-star"></i>';
          }
          return html;
        }

        // --- Helper: Format currency in INR ---
        function formatRate(rate) {
          return "\u20B9" + Number(rate).toLocaleString("en-IN");
        }

        // --- Helper: Escape HTML to prevent XSS ---
        function escapeHtml(text) {
          var div = document.createElement("div");
          div.appendChild(document.createTextNode(text));
          return div.innerHTML;
        }

        // --- Render Equipment Cards into the Grid ---
        function renderEquipment(items) {
          if (!items || items.length === 0) {
            equipmentGrid.innerHTML =
              '<div class="col-span-full text-center py-8">' +
              '<i class="fas fa-box-open text-gray-500 text-3xl"></i>' +
              '<p class="text-gray-400 mt-2">No equipment found matching your filters.</p>' +
              "</div>";
            showMoreContainer.classList.add("hidden");
            return;
          }

          var html = "";
          items.forEach(function (eq) {
            var imgSrc =
              eq.image ||
              eq.image_url ||
              "/static/images/" + (eq.type || "equipment") + ".jpg";
            var name = eq.name || eq.model_name || "Equipment";
            var loc = eq.location || "Unknown";
            var description = eq.description || "";
            var rate = eq.daily_rate || eq.rate || 0;
            var rating = eq.rating || 0;
            var reviewCount = eq.review_count || eq.reviews || 0;
            var eqId = eq.id || eq._id || "";

            html +=
              '<div class="bg-[#162619] rounded-xl p-4 border border-[#2d3d2f]/40 equipment-card" data-id="' +
              escapeHtml(String(eqId)) +
              '">' +
              '<div class="flex items-center gap-4">' +
              '<img src="' +
              escapeHtml(imgSrc) +
              '" alt="' +
              escapeHtml(name) +
              '" class="w-20 h-20 object-cover rounded-lg"' +
              " onerror=\"this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%231a2e1d%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2214%22 fill=%22%234caf50%22%3EEquipment%3C/text%3E%3C/svg%3E'\">" +
              '<div class="flex-1">' +
              '<h3 class="text-white font-bold">' +
              escapeHtml(name) +
              "</h3>" +
              (description
                ? '<p class="text-gray-400 text-xs mb-1 line-clamp-1">' +
                  escapeHtml(description) +
                  "</p>"
                : "") +
              '<div class="flex items-center gap-1 text-yellow-400 text-xs mb-1">' +
              renderStars(rating) +
              '<span class="text-gray-400">(' +
              escapeHtml(String(reviewCount)) +
              ")</span>" +
              "</div>" +
              '<div class="flex justify-between items-center">' +
              "<div>" +
              '<span class="text-gray-400 text-xs block">' +
              escapeHtml(loc) +
              "</span>" +
              '<span class="text-[#4caf50] font-bold">' +
              formatRate(rate) +
              "/day</span>" +
              "</div>" +
              '<button class="bg-[#4caf50] hover:bg-[#3d9140] text-white px-3 py-1 rounded-lg text-sm rent-btn"' +
              ' data-id="' +
              escapeHtml(String(eqId)) +
              '"' +
              ' data-name="' +
              escapeHtml(name) +
              '">Rent</button>' +
              "</div>" +
              "</div>" +
              "</div>" +
              "</div>";
          });

          equipmentGrid.innerHTML = html;

          // Attach click handlers to all dynamically created Rent buttons
          var rentButtons = equipmentGrid.querySelectorAll(".rent-btn");
          rentButtons.forEach(function (btn) {
            btn.addEventListener("click", function () {
              var id = this.getAttribute("data-id");
              var eqName = this.getAttribute("data-name");
              openBookingModal(id, eqName);
            });
          });

          // Show "Show More" button if there are enough results
          if (items.length >= 6) {
            showMoreContainer.classList.remove("hidden");
          } else {
            showMoreContainer.classList.add("hidden");
          }
        }

        // --- Show Loading State ---
        function showLoading() {
          equipmentGrid.innerHTML =
            '<div class="col-span-full text-center py-8">' +
            '<i class="fas fa-spinner fa-spin text-[#4caf50] text-3xl"></i>' +
            '<p class="text-gray-400 mt-2">Loading equipment...</p>' +
            "</div>";
        }

        // --- Show Error State ---
        function showError(message) {
          equipmentGrid.innerHTML =
            '<div class="col-span-full text-center py-8">' +
            '<i class="fas fa-exclamation-triangle text-red-400 text-3xl"></i>' +
            '<p class="text-gray-400 mt-2">' +
            escapeHtml(
              message || "Failed to load equipment. Please try again.",
            ) +
            "</p>" +
            '<button onclick="location.reload()" class="mt-3 bg-[#4caf50] hover:bg-[#3d9140] text-white px-4 py-2 rounded-lg text-sm">Retry</button>' +
            "</div>";
        }

        // --- Fetch Equipment from API ---
        function fetchEquipment(params) {
          showLoading();

          var url = "/api/equipment";
          var queryParts = [];

          if (params) {
            if (params.type)
              queryParts.push("type=" + encodeURIComponent(params.type));
            if (params.location)
              queryParts.push(
                "location=" + encodeURIComponent(params.location),
              );
            if (params.min_price)
              queryParts.push(
                "min_price=" + encodeURIComponent(params.min_price),
              );
            if (params.max_price)
              queryParts.push(
                "max_price=" + encodeURIComponent(params.max_price),
              );
          }

          if (queryParts.length > 0) {
            url += "?" + queryParts.join("&");
          }

          fetch(url)
            .then(function (response) {
              if (!response.ok) {
                throw new Error("Server returned " + response.status);
              }
              return response.json();
            })
            .then(function (data) {
              // Support both { equipment: [...] } wrapper and plain array responses
              var items = Array.isArray(data)
                ? data
                : data.equipment || data.items || data.results || [];
              renderEquipment(items);
            })
            .catch(function (error) {
              console.error("Error fetching equipment:", error);
              showError("Failed to load equipment. Please try again.");
            });
        }

        // --- Filter / Search Handler ---
        filterSearchBtn.addEventListener("click", function () {
          var params = {};
          var typeVal = typeFilter.value;
          var locVal = locationFilter.value.trim();
          var minVal = priceMinFilter.value;
          var maxVal = priceMaxFilter.value;

          if (typeVal) params.type = typeVal;
          if (locVal) params.location = locVal;
          if (minVal) params.min_price = minVal;
          if (maxVal) params.max_price = maxVal;

          fetchEquipment(params);
        });

        // Also trigger a filtered fetch when the equipment type dropdown changes
        typeFilter.addEventListener("change", function () {
          var params = {};
          if (this.value) params.type = this.value;
          fetchEquipment(params);
        });

        // --- Booking Modal Logic ---
        function openBookingModal(equipmentId, equipName) {
          bookingEquipmentId.value = equipmentId;
          bookingEquipmentName.textContent = equipName;
          bookingForm.reset();
          // reset() clears hidden fields too, so restore the id
          bookingEquipmentId.value = equipmentId;

          // Set minimum selectable date to today
          var today = new Date().toISOString().split("T")[0];
          document.getElementById("startDate").setAttribute("min", today);
          document.getElementById("endDate").setAttribute("min", today);

          openModal(bookingModal);
        }

        closeBookingModalBtn.addEventListener("click", function () {
          closeModalFn(bookingModal);
        });

        cancelBookingBtn.addEventListener("click", function () {
          closeModalFn(bookingModal);
        });

        // Close booking modal when clicking on the backdrop
        bookingModal.addEventListener("click", function (e) {
          if (e.target === bookingModal) {
            closeModalFn(bookingModal);
          }
        });

        // --- Booking Form Submission ---
        bookingForm.addEventListener("submit", function (e) {
          e.preventDefault();

          var eqId = bookingEquipmentId.value;
          var renterNameVal = document
            .getElementById("renterName")
            .value.trim();
          var renterPhoneVal = document
            .getElementById("renterPhone")
            .value.trim();
          var startDateVal = document.getElementById("startDate").value;
          var endDateVal = document.getElementById("endDate").value;

          // Basic client-side validation
          if (
            !renterNameVal ||
            !renterPhoneVal ||
            !startDateVal ||
            !endDateVal
          ) {
            alert("Please fill in all fields.");
            return;
          }

          if (new Date(endDateVal) < new Date(startDateVal)) {
            alert("End date must be on or after the start date.");
            return;
          }

          var submitBtn = document.getElementById("submitBookingBtn");
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin mr-2"></i>Booking...';

          fetch("/api/equipment/" + encodeURIComponent(eqId) + "/book", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              renter_name: renterNameVal,
              renter_phone: renterPhoneVal,
              start_date: startDateVal,
              end_date: endDateVal,
            }),
          })
            .then(function (response) {
              if (!response.ok) {
                return response.json().then(function (err) {
                  throw new Error(
                    err.message || err.detail || "Booking failed",
                  );
                });
              }
              return response.json();
            })
            .then(function (data) {
              closeModalFn(bookingModal);
              showToast(
                'Booking confirmed successfully! Your rental for "' +
                  bookingEquipmentName.textContent +
                  '" has been booked.',
              );
              // Refresh the equipment list to reflect any availability changes
              fetchEquipment();
            })
            .catch(function (error) {
              console.error("Booking error:", error);
              alert("Booking failed: " + error.message + ". Please try again.");
            })
            .finally(function () {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "Confirm Booking";
            });
        });

        // --- List Equipment Modal ---
        listBtn.addEventListener("click", function () {
          openModal(listModal);
        });

        closeBtn.addEventListener("click", function () {
          closeModalFn(listModal);
        });

        cancelBtn.addEventListener("click", function () {
          closeModalFn(listModal);
        });

        // Close list modal when clicking on the backdrop
        listModal.addEventListener("click", function (e) {
          if (e.target === listModal) {
            closeModalFn(listModal);
          }
        });

        // List-equipment form submission
        equipmentForm.addEventListener("submit", function (e) {
          e.preventDefault();

          // Collect form data
          var formData = {
            type: equipmentForm.querySelector("select").value,
            name: equipmentForm.querySelectorAll('input[type="text"]')[0].value,
            daily_rate: equipmentForm.querySelector('input[type="number"]')
              .value,
            location:
              equipmentForm.querySelectorAll('input[type="text"]')[1].value,
            description: equipmentForm.querySelector("textarea").value,
            owner: "current_user", // TODO: Get from session
          };

          // Validate
          if (
            !formData.type ||
            !formData.name ||
            !formData.daily_rate ||
            !formData.location
          ) {
            alert("Please fill in all required fields");
            return;
          }

          // Show loading state
          var submitBtn = equipmentForm.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.textContent = "Listing...";

          // POST to API
          fetch("/api/equipment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
          })
            .then(function (response) {
              if (!response.ok) {
                return response.json().then(function (err) {
                  throw new Error(
                    err.message || err.detail || "Failed to list equipment",
                  );
                });
              }
              return response.json();
            })
            .then(function (data) {
              showToast("Equipment listed successfully!");
              closeModalFn(listModal);
              equipmentForm.reset();
              fetchEquipment(); // Refresh grid
            })
            .catch(function (error) {
              console.error("Error listing equipment:", error);
              alert("Failed to list equipment: " + error.message);
            })
            .finally(function () {
              submitBtn.disabled = false;
              submitBtn.textContent = "List Equipment";
            });
        });

        // --- Initial Load: fetch all equipment on page load ---
        fetchEquipment();
      });
    </script>
  </body>
</html>
